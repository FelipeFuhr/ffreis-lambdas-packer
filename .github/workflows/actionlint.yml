name: Workflow Lint (actionlint)

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-actionlint.yml@c3e3e0a44d4b79697f1babaa9bf287d1b264da52
    with:
      working-directory: .
