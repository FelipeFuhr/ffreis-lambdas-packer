name: Shellcheck

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@b99f5a3e0c87c6cc45f630b7bc24a0cc6eba148e
    with:
      working-directory: .
