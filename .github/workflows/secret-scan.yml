name: Secret Scan (gitleaks)

# Scans commits AND files for secrets on every PR and push to main.
# Also runs weekly to catch secrets pushed directly to the default branch.
# Fails CI if any secret is detected.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret Scan
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@b99f5a3e0c87c6cc45f630b7bc24a0cc6eba148e
    with:
      working-directory: .
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
