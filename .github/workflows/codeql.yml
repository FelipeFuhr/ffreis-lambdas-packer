name: CodeQL

on:
  pull_request:
    branches: [main]
    paths:
      - "cmd/**"
      - "internal/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/codeql.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@b99f5a3e0c87c6cc45f630b7bc24a0cc6eba148e
    with:
      languages: go
      source-root: .
